services:
  - type: web
    name: shadowing-web
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: shadowing-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
